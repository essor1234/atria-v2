<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Warehouse">
  <defs>
    <linearGradient id="wh-body" x1="0" y1="4" x2="0" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="wh-roof" x1="0" y1="3" x2="0" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Foundation slab -->
  <rect x="2" y="27" width="28" height="3" rx="0.5" fill="#0F172A"/>

  <!-- Vault body — gabled silhouette, near-white so it pops on dark sidebar -->
  <path d="M5 11 L16 4 L27 11 V27 H5 Z"
        fill="url(#wh-body)" stroke="#0F172A" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Roof cap -->
  <path d="M5 11 L16 4 L27 11 Z"
        fill="url(#wh-roof)" stroke="#0F172A" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Bay door frame -->
  <rect x="11" y="17" width="10" height="10" fill="#0F172A"/>

  <!-- Stacked crates inside the bay — pallet boxes -->
  <rect x="12.3" y="18.3" width="3.4" height="3.4" fill="#F5C26B" stroke="#0F172A" stroke-width="0.7"/>
  <rect x="16.3" y="18.3" width="3.4" height="3.4" fill="#F5C26B" stroke="#0F172A" stroke-width="0.7"/>
  <rect x="12.3" y="22.3" width="3.4" height="3.4" fill="#E08D5A" stroke="#0F172A" stroke-width="0.7"/>
  <rect x="16.3" y="22.3" width="3.4" height="3.4" fill="#E08D5A" stroke="#0F172A" stroke-width="0.7"/>

  <!-- Roof seam highlight -->
  <line x1="16" y1="4" x2="16" y2="11" stroke="#0F172A" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Coral lightning bolt — signature accent -->
  <path d="M24 5 L20.5 12 L23 12 L21 17 L26 10 L23.5 10 Z"
        fill="#F58A6B" stroke="#0F172A" stroke-width="1" stroke-linejoin="round"/>
</svg>
