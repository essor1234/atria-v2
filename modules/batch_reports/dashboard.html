<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Batch Reports</title>
  <link rel="stylesheet" href="__base.css" />
  <style>
    body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; color: hsl(var(--card-foreground)); background: hsl(var(--background)); padding: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .bar h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:-0.2px; }
    button { cursor:pointer; font:inherit; display:inline-flex; align-items:center; gap:6px;
      padding:6px 12px; border-radius:8px; border:1px solid hsl(var(--border));
      background:hsl(var(--card)); color:hsl(var(--card-foreground)); transition:background .15s; }
    button:hover { background:hsl(var(--muted) / 0.12); }
    .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
    .kpi { border:1px solid hsl(var(--border)); border-radius:10px; padding:12px 14px; background:hsl(var(--card)); }
    .kpi .label { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:hsl(var(--muted)); }
    .kpi .value { font-size:22px; font-weight:600; margin-top:4px; letter-spacing:-0.5px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:right; padding:8px 10px; border-bottom:1px solid hsl(var(--border) / 0.6); }
    th:first-child, td:first-child { text-align:left; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:hsl(var(--muted)); font-weight:500; }
    .revbar { height:6px; border-radius:3px; background:hsl(150 46% 42%); }
    .revcell { display:flex; flex-direction:column; gap:4px; align-items:flex-end; }
    .top { color:hsl(150 46% 42%); font-weight:600; }
    .empty { border:1px dashed hsl(var(--border)); border-radius:12px; padding:40px 20px; text-align:center; color:hsl(var(--muted)); }
    .empty code { background:hsl(var(--muted) / 0.12); padding:2px 6px; border-radius:5px; }
    .err { color:hsl(0 72% 51%); margin-bottom:12px; }
    .muted { color:hsl(var(--muted)); }
  </style>
</head>
<body>
  <div class="bar">
    <h1>Batch Reports <span class="muted mono" style="font-size:12px">· doanh thu theo vùng</span></h1>
    <button id="refresh" aria-label="Refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Refresh
    </button>
  </div>

  <div id="err" class="err" style="display:none"></div>
  <div id="kpis" class="kpis"></div>
  <div id="content"></div>

  <script src="__bridge.js"></script>
  <script>
    (function () {
      var el = {
        err: document.getElementById("err"),
        kpis: document.getElementById("kpis"),
        content: document.getElementById("content"),
        refresh: document.getElementById("refresh"),
      };

      function money(n) { return "$" + (Number(n) || 0).toLocaleString("en-US"); }
      function num(n) { return (Number(n) || 0).toLocaleString("en-US"); }

      function setErr(msg) {
        el.err.style.display = msg ? "block" : "none";
        el.err.textContent = msg || "";
      }

      function kpi(label, value) {
        return '<div class="kpi"><div class="label">' + label +
          '</div><div class="value mono">' + value + '</div></div>';
      }

      function render(data) {
        data = data || {};
        var regions = data.regions || [];
        var maxRev = regions.reduce(function (m, r) { return Math.max(m, r.revenue || 0); }, 0) || 1;

        el.kpis.innerHTML =
          kpi("Regions", num(data.count)) +
          kpi("Total units", num(data.total_units)) +
          kpi("Total revenue", money(data.total_revenue)) +
          kpi("Top region", regions.length ? regions[0].region : "—");

        if (!regions.length) {
          el.content.innerHTML =
            '<div class="empty">Chưa có báo cáo nào.<br><br>' +
            'Dispatch một request nhiều vùng qua <code class="mono">solve(strategy="divide", module="batch_reports")</code>, ' +
            'rồi <code class="mono">merge</code> — kết quả sẽ hiện ở đây.</div>';
          return;
        }

        var rows = regions.map(function (r, i) {
          var pct = Math.max(((r.revenue || 0) / maxRev) * 100, 2);
          return '<tr>' +
            '<td class="mono ' + (i === 0 ? "top" : "") + '">' + r.region + (i === 0 ? " ★" : "") + '</td>' +
            '<td class="mono">' + num(r.units) + '</td>' +
            '<td class="mono">$' + num(r.avg_price) + '</td>' +
            '<td class="mono">' + ((r.return_rate || 0) * 100).toFixed(1) + '%</td>' +
            '<td><div class="revcell"><span class="mono">' + money(r.revenue) + '</span>' +
            '<div class="revbar" style="width:' + pct + '%"></div></div></td>' +
            '</tr>';
        }).join("");

        el.content.innerHTML =
          '<table><thead><tr><th>Region</th><th>Units</th><th>Avg price</th>' +
          '<th>Return</th><th>Revenue</th></tr></thead><tbody>' + rows + '</tbody></table>' +
          (data.summary ? '' : '<p class="muted mono" style="margin-top:12px;font-size:12px">' +
            '(chưa merge — chạy <code>merge</code> để có summary.json)</p>');
      }

      function reportSize() {
        if (window.AtriaDash && AtriaDash.resize) {
          AtriaDash.resize(document.body.scrollHeight + 24);
        }
      }

      function load() {
        setErr("");
        AtriaDash.json("report.py", ["dashboard", "--json"])
          .then(function (data) { render(data); })
          .catch(function (e) { setErr("Lỗi tải dashboard: " + (e && e.message ? e.message : e)); })
          .then(reportSize);
      }

      el.refresh.addEventListener("click", load);
      if (window.AtriaDash && AtriaDash.ready) AtriaDash.ready();

      // Auto-refresh (P1) — dispatched divide jobs write report files in the
      // background, so poll while the dashboard is visible instead of forcing a
      // manual Refresh. Pause when hidden to avoid needless work.
      var _visible = true;
      if (window.AtriaDash && AtriaDash.onVisibility) {
        AtriaDash.onVisibility(function (v) { _visible = !!v; if (v) load(); });
      }
      setInterval(function () { if (_visible) load(); }, 5000);

      load();
    })();
  </script>
</body>
</html>
