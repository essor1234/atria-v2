<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topic Briefings</title>
  <link rel="stylesheet" href="__base.css" />
  <style>
    body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; color: hsl(var(--card-foreground)); background: hsl(var(--background)); padding: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .bar h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:-0.2px; }
    button { cursor:pointer; font:inherit; display:inline-flex; align-items:center; gap:6px;
      padding:6px 12px; border-radius:8px; border:1px solid hsl(var(--border));
      background:hsl(var(--card)); color:hsl(var(--card-foreground)); transition:background .15s; }
    button:hover { background:hsl(var(--muted) / 0.12); }
    .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-bottom:16px; }
    .kpi { border:1px solid hsl(var(--border)); border-radius:10px; padding:12px 14px; background:hsl(var(--card)); }
    .kpi .label { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:hsl(var(--muted)); }
    .kpi .value { font-size:22px; font-weight:600; margin-top:4px; letter-spacing:-0.5px; }
    .card { border:1px solid hsl(var(--border)); border-radius:12px; padding:14px 16px; background:hsl(var(--card)); margin-bottom:10px; }
    .card h3 { margin:0 0 6px 0; font-size:14px; font-weight:600; letter-spacing:-0.2px; }
    .meta { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:hsl(var(--muted)); margin-bottom:8px; display:flex; gap:12px; flex-wrap:wrap; }
    .badge { display:inline-block; padding:1px 8px; border-radius:999px; background:hsl(var(--muted) / 0.15); font-size:10px; margin-right:4px; }
    ul.points { margin:6px 0 0 0; padding-left:18px; }
    ul.points li { margin:2px 0; }
    .top { color:hsl(150 46% 42%); font-weight:600; }
    .empty { border:1px dashed hsl(var(--border)); border-radius:12px; padding:40px 20px; text-align:center; color:hsl(var(--muted)); }
    .empty code { background:hsl(var(--muted) / 0.12); padding:2px 6px; border-radius:5px; }
    .err { color:hsl(0 72% 51%); margin-bottom:12px; }
    .muted { color:hsl(var(--muted)); }
  </style>
</head>
<body>
  <div class="bar">
    <h1>Topic Briefings <span class="muted mono" style="font-size:12px">· weekly digest</span></h1>
    <button id="refresh" aria-label="Refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Refresh
    </button>
  </div>

  <div id="err" class="err" style="display:none"></div>
  <div id="kpis" class="kpis"></div>
  <div id="content"></div>

  <script src="__bridge.js"></script>
  <script>
    (function () {
      var el = {
        err: document.getElementById('err'),
        kpis: document.getElementById('kpis'),
        content: document.getElementById('content'),
        refresh: document.getElementById('refresh'),
      };

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
      }

      function kpi(label, value) {
        return '<div class="kpi"><div class="label">' + esc(label) + '</div><div class="value">' + esc(value) + '</div></div>';
      }

      function render(payload) {
        el.err.style.display = 'none';
        if (!payload || payload.ok === false) {
          el.err.textContent = (payload && payload.error) || 'Unknown error';
          el.err.style.display = '';
          el.kpis.innerHTML = '';
          el.content.innerHTML = '';
          return;
        }

        var topics = payload.topics || [];
        var digest = payload.digest || null;
        el.kpis.innerHTML =
          kpi('Topics', payload.count || 0) +
          kpi('Avg confidence', (payload.avg_confidence != null ? payload.avg_confidence : '—')) +
          kpi('Reading time (min)', payload.total_reading_time_min || 0) +
          kpi('Top topic', digest ? digest.top_topic : (topics[0] && topics[0].topic) || '—');

        if (!topics.length) {
          el.content.innerHTML =
            '<div class="empty">Chưa có briefing nào. Chạy '
            + '<code>python scripts/briefing.py gen --topic ai</code> hoặc dispatch '
            + '<code>solve(strategy="divide", module="topic_briefings", request="...")</code>.</div>';
          return;
        }

        var html = topics.map(function (b, i) {
          var score = (Number(b.confidence || 0) * Number(b.reading_time_min || 0)).toFixed(2);
          var tags = (b.tags || []).map(function (t) { return '<span class="badge">' + esc(t) + '</span>'; }).join('');
          var points = (b.key_points || []).map(function (p) { return '<li>' + esc(p) + '</li>'; }).join('');
          return (
            '<div class="card">'
            + '<h3>' + (i === 0 ? '<span class="top">★ </span>' : '') + esc(b.topic) + ' — ' + esc(b.headline) + '</h3>'
            + '<div class="meta">'
            +   '<span>conf ' + esc(b.confidence) + '</span>'
            +   '<span>read ' + esc(b.reading_time_min) + ' min</span>'
            +   '<span>score ' + score + '</span>'
            +   '<span>' + tags + '</span>'
            + '</div>'
            + '<ul class="points">' + points + '</ul>'
            + '</div>'
          );
        }).join('');
        el.content.innerHTML = html;
      }

      async function load() {
        try {
          var res = await window.__bridge.run(['dashboard']);
          render(res);
        } catch (e) {
          el.err.textContent = String(e && e.message || e);
          el.err.style.display = '';
        }
      }

      el.refresh.addEventListener('click', load);
      load();
    })();
  </script>
</body>
</html>
