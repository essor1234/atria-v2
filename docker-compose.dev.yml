services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=atria
      - POSTGRES_USER=atria
      - POSTGRES_PASSWORD=atria
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atria -d atria"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
      - ADMINER_DEFAULT_DB=atria
      - ADMINER_DEFAULT_USERNAME=atria
      - ADMINER_DEFAULT_PASSWORD=atria
      - ADMINER_DESIGN=pepa-linha
    depends_on:
      db:
        condition: service_healthy

  atria:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - ATRIA_API_BASE_URL=${ATRIA_API_BASE_URL}
      - ATRIA_MODEL=${ATRIA_MODEL}
      - DATABASE_URL=${DATABASE_URL:-postgresql://atria:atria@db:5432/atria}
      - ATRIA_REDIS_URL=redis://redis:6379/0
      - ATRIA_DISABLED_MODULES=${ATRIA_DISABLED_MODULES:-}
      - MC_INDEX_EMBED_BASE_URL=http://tei:80/v1
      - MC_CHUNK_EMBED_BASE_URL=http://tei:80/v1
      - MC_SYNTHESIS_BASE_URL=${MC_SYNTHESIS_BASE_URL:-http://copilot-llm:8000/v1}
      - MC_KG_EXTRACT_BASE_URL=${MC_KG_EXTRACT_BASE_URL:-http://copilot-llm:8000/v1}
      - MC_QDRANT_URL=http://qdrant:6333
      - MC_NEO4J_URI=bolt://neo4j:7687
      - MC_NEO4J_USER=neo4j
      - MC_NEO4J_PASSWORD=atria-neo4j
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atria_data:/root/.atria
      # Mount Python source for hot reload — no rebuild needed on code change
      - ./atria:/app/atria
      # Mount modules so new/edited modules appear without rebuilding the image
      - ./modules:/app/modules
    command: >
      /bin/sh -c "
        mkdir -p /root/.atria &&
        printf '{\"model\":\"%s\",\"api_base_url\":\"%s\"}\n'
          \"$${ATRIA_MODEL:-gpt-4o}\"
          \"$${ATRIA_API_BASE_URL:-https://api.openai.com/v1/chat/completions}\"
          > /root/.atria/settings.json &&
        exec uvicorn atria.web.server:create_app --factory
          --host 0.0.0.0 --port 8080
          --reload --reload-dir /app/atria
          --reload-delay 0.25
          --log-level info
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Redis — backs the TaskIQ broker, job state, blackboard, and message bus.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # TaskIQ worker — consumes dispatched subagent tasks (the `solve` tool).
  atria-worker:
    build: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - ATRIA_API_BASE_URL=${ATRIA_API_BASE_URL}
      - ATRIA_MODEL=${ATRIA_MODEL}
      - DATABASE_URL=${DATABASE_URL:-postgresql://atria:atria@db:5432/atria}
      - ATRIA_REDIS_URL=redis://redis:6379/0
      - ATRIA_DISABLED_MODULES=${ATRIA_DISABLED_MODULES:-}
      - MC_INDEX_EMBED_BASE_URL=http://tei:80/v1
      - MC_CHUNK_EMBED_BASE_URL=http://tei:80/v1
      - MC_SYNTHESIS_BASE_URL=${MC_SYNTHESIS_BASE_URL:-http://copilot-llm:8000/v1}
      - MC_KG_EXTRACT_BASE_URL=${MC_KG_EXTRACT_BASE_URL:-http://copilot-llm:8000/v1}
      - MC_QDRANT_URL=http://qdrant:6333
      - MC_NEO4J_URI=bolt://neo4j:7687
      - MC_NEO4J_USER=neo4j
      - MC_NEO4J_PASSWORD=atria-neo4j
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atria_data:/root/.atria
      - ./atria:/app/atria
      - ./modules:/app/modules
    entrypoint:
      - /bin/sh
      - -c
      - >
        mkdir -p /root/.atria &&
        printf '{"model":"%s","api_base_url":"%s"}\n'
          "$${ATRIA_MODEL:-gpt-4o}"
          "$${ATRIA_API_BASE_URL:-https://api.openai.com/v1/chat/completions}"
          > /root/.atria/settings.json &&
        exec taskiq worker atria.core.tasks.broker:broker atria.core.tasks.tasks
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: ["--model-id", "Qwen/Qwen3-Embedding-0.6B"]
    ports:
      - "8082:80"
    volumes:
      - tei_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/atria-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # GPU-dependent. On a no-GPU host, do NOT start this service; instead point
  # MC_SYNTHESIS_BASE_URL / MC_KG_EXTRACT_BASE_URL at an external endpoint.
  copilot-llm:
    image: vllm/vllm-openai:latest
    command: ["--model", "Qwen/Qwen2.5-1.5B-Instruct", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    profiles: ["gpu"]

volumes:
  atria_data:
  postgres_data:
  tei_data:
  qdrant_data:
  neo4j_data:
  hf_cache:
